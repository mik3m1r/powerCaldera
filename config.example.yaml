# Configuración de powerCaldera
# Copia este archivo a ~/.powercaldera/config.yaml y edita los valores

server:
  # URL del servidor MITRE Caldera
  url: "http://localhost:8888"
  # API Key (también puedes usar la variable de entorno CALDERA_API_KEY)
  api_key: "ADMIN123"

settings:
  # Valor cargado por Config, pero la UI todavía no lo usa para refresco automático
  refresh_interval: 30
  # Directorio adicional de plantillas. Se carga, pero hoy no está conectado al cargador de plantillas
  # templates_dir: "/ruta/a/mis/plantillas"
  # Nivel de log (también puede venir de CALDERA_LOG_LEVEL o --log-level)
  log_level: "INFO"
